<!DOCTYPE html>
<html>
<head>
<style>
.clock-face {
  width: 200px; height: 200px; 
  border: 4px solid black; 
  border-radius: 50%; 
  position: relative;
  background: white;
  margin: 50px auto;
}
.hand { 
  position: absolute; 
  bottom: 50%; 
  left: 50%; 
  transform-origin: bottom center; 
  background: black; 
  z-index: 20; 
  transform: translateX(-50%) rotate(0deg); 
}
.hour-hand { width: 6px; height: 45px; }
.min-hand { width: 4px; height: 65px; background: blue; }
.second-hand { width: 2px; height: 70px; background: red; }
</style>
</head>
<body>
<div class="clock-face">
  <div class="hand hour-hand"></div>
  <div class="hand min-hand"></div>
  <div class="hand second-hand"></div>
</div>
<div id="debug" style="text-align: center; font-family: monospace;"></div>
<script>
function updateClock() {
  const now = new Date();
  const s = now.getSeconds();
  const m = now.getMinutes();
  const h = now.getHours();
  
  const secDeg = (s / 60) * 360;
  const minDeg = (m / 60) * 360 + (s / 60) * 6;
  const hourDeg = (h / 12) * 360 + (m / 60) * 30;
  
  const secondHand = document.querySelector('.second-hand');
  const minHand = document.querySelector('.min-hand');
  const hourHand = document.querySelector('.hour-hand');
  
  if (secondHand) secondHand.style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
  if (minHand) minHand.style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
  if (hourHand) hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
  
  document.getElementById('debug').innerHTML = 
    `Time: ${h}:${m}:${s}<br>` +
    `Hour: ${hourDeg.toFixed(1)}° | Min: ${minDeg.toFixed(1)}° | Sec: ${secDeg.toFixed(1)}°<br>` +
    `Min Hand Found: ${!!minHand} | Transform: ${minHand?.style.transform}`;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
