<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock-o-matic Web</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #181818; min-height: 100vh; margin: 0; }
  </style>
</head>
<body>
  <script src="content.js"></script>
  <noscript>This page requires JavaScript to function.</noscript>
  <div style="position:fixed;bottom:10px;right:10px;color:#fff;font-size:14px;z-index:9999;text-align:right;">
    <b>Clock-o-matic</b> &mdash; <a href="https://github.com/Rob-o-matic/Clock-o-matic" style="color:#66BB6A;">GitHub</a><br>
    <span style="font-size:13px; margin-left:10px;">
      <a href="README.md" style="color:#fff;text-decoration:underline;opacity:0.85;">Read Me</a> |
      <a href="PRIVACY.md" style="color:#fff;text-decoration:underline;opacity:0.85;">Privacy</a>
    </span>
  </div>
  <div id="version-indicator" style="position:fixed;bottom:10px;left:10px;color:#fff;font-size:13px;z-index:9999;text-align:left;opacity:0.7;"></div>
  <script>
    // Show version as last script save date/time
    // This will use the last modified time of content.js if available, else current time
    fetch('content.js', {cache: 'reload'}).then(r => r.headers.get('last-modified')).then(date => {
      document.getElementById('version-indicator').textContent = date ? `v${date.replace(/:|\s|GMT/g,'-').replace(/--+/g,'-')}` : `v${new Date().toLocaleString()}`;
    }).catch(() => {
      document.getElementById('version-indicator').textContent = `v${new Date().toLocaleString()}`;
    });
  </script>
</body>
</html>
